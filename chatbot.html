<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MIRRA Chatbot</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<section class="login">

    <div class="login-box">

        <h2>Habla con MIRRA ✨</h2>

        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input">

            <input type="text" id="userInput" placeholder="Escribe a MIRRA...">

            <button onclick="sendMessage()">
                Enviar
            </button>

        </div>

    </div>

</section>

<script>

function sendMessage(){

    let input = document.getElementById("userInput");
    let chatBox = document.getElementById("chatBox");

    let text = input.value.trim().toLowerCase();

    if(text === "") return;

    // MENSAJE USUARIO

    chatBox.innerHTML += `
        <div class="msg user">
            ${input.value}
        </div>
    `;

    let response = "";

    // SALUDO

    if(
        text.includes("hola") ||
        text.includes("holi") ||
        text.includes("buenas")
    ){
        response = "✨ ¡Hola! Soy MIRRA, tu asesora digital de moda. ¿Quieres ver prendas, asesorías o crear outfits?";
    }

    // PRENDAS

    else if(
        text.includes("prendas") ||
        text.includes("ropa") ||
        text.includes("catálogo") ||
        text.includes("catalogo")
    ){
        response = "👗 En Mirror puedes encontrar prendas modernas, outfits personalizados y recomendaciones de estilo. Puedes explorarlas desde la sección 'Prendas' en el menú principal.";
    }

    // ASESORÍAS

    else if(
        text.includes("asesoría") ||
        text.includes("asesorias") ||
        text.includes("asesorías")
    ){
        response = "💖 Tenemos 3 tipos de asesoría: Básica, Media y Premium. La sección está en la página principal.";
    }

    // UBICACIÓN ASESORÍA

    else if(
        text.includes("dónde está asesoría") ||
        text.includes("donde esta asesoria") ||
        text.includes("sección de asesoría")
    ){
        response = "✨ La sección de asesorías está en la página principal, debajo de '¿Por qué Mirror?'.";
    }

    // LOGIN

    else if(
        text.includes("iniciar sesión") ||
        text.includes("login") ||
        text.includes("registrarse")
    ){
        response = "🔐 Puedes iniciar sesión o registrarte desde los botones superiores de la página.";
    }

    // CONTACTO

    else if(
        text.includes("contacto") ||
        text.includes("correo") ||
        text.includes("teléfono")
    ){
        response = "📩 Puedes encontrarnos en la sección Contacto. También puedes escribirnos a mirrorstyle@gmail.com";
    }

    // IA

    else if(
        text.includes("ia") ||
        text.includes("outfit") ||
        text.includes("crear outfit")
    ){
        response = "✨ Nuestra IA puede ayudarte a crear outfits personalizados usando prendas Mirror.";
    }

    // PREMIUM

    else if(
        text.includes("premium")
    ){
        response = "👑 La asesoría Premium incluye transformación completa de imagen.";
    }

    // BÁSICA

    else if(
        text.includes("básica") ||
        text.includes("basica")
    ){
        response = "🌸 La asesoría Básica incluye consejos simples y outfits sencillos.";
    }

    // MEDIA

    else if(
        text.includes("media")
    ){
        response = "💻 La asesoría Media incluye atención personalizada virtual.";
    }

    // UBICACIÓN

    else if(
        text.includes("ubicación") ||
        text.includes("ubicacion")
    ){
        response = "📍 Mirror está ubicado en Bogotá, Colombia.";
    }

    // DESPEDIDA

    else if(
        text.includes("gracias")
    ){
        response = "🤍 ¡Siempre es un placer ayudarte!";
    }

    // INICIAR SESIÓN

else if(
    text.includes("cómo iniciar sesión") ||
    text.includes("como iniciar sesion") ||
    text.includes("cómo puedo iniciar sesión")
){
    response = "🔐 Dirígete al menú principal y presiona 'Iniciar sesión'. Luego coloca tu correo y contraseña.";
}

// REGISTRARSE

else if(
    text.includes("cómo registrarme") ||
    text.includes("como registrarme") ||
    text.includes("registrarse")
){
    response = "✨ Ve al menú principal y presiona 'Registrarse'. Luego completa tu correo, contraseña y los datos solicitados.";
}

// PERSONALIZAR OUTFIT

else if(
    text.includes("personalizar mi outfit") ||
    text.includes("puedo personalizar") ||
    text.includes("personalizar outfit")
){
    response = "👗 ¡Sí! Puedes personalizar tu outfit con MIRROR AI Outfit Creator.";
}

// DÓNDE PERSONALIZAR

else if(
    text.includes("dónde personalizar") ||
    text.includes("donde personalizar") ||
    text.includes("dónde está outfit creator") ||
    text.includes("outfit creator")
){
    response = "✨ Puedes encontrar MIRROR AI Outfit Creator en la página principal.";
}
    // DEFAULT

    else{
        response = "✨ Lo siento, aún estoy aprendiendo. Puedes preguntarme sobre prendas, asesorías, outfits, contacto o Mirror AI.";
    }

    // RESPUESTA MIRRA

    setTimeout(() => {

        chatBox.innerHTML += `
            <div class="msg bot">
                ${response}
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    }, 400);

    input.value = "";

}

// ENTER PARA ENVIAR

document.addEventListener("DOMContentLoaded", () => {

    const input = document.getElementById("userInput");

    input.addEventListener("keypress", function(event){

        if(event.key === "Enter"){
            sendMessage();
        }

    });

});

</script>
